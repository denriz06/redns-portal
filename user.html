<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>User Dashboard | Redns Web</title>
    <link rel="stylesheet" href="user_style.css">
</head>
<body>
    <div class="login-light"></div>

    <div class="login-box">
        <input type="checkbox" class="input-check" id="input-check" checked>
        <label for="input-check" class="toggle">
            <span class="text off">off</span>
            <span class="text on">on</span>
        </label>
        <!-- Color Picker -->
        <div class="color-picker">
            <div class="color-dot active" data-color="blue"  title="Biru Neon"  onclick="setNeonColor('blue')"></div>
            <div class="color-dot"        data-color="green" title="Hijau Neon" onclick="setNeonColor('green')"></div>
            <div class="color-dot"        data-color="pink"  title="Pink Neon"  onclick="setNeonColor('pink')"></div>
        </div>
        
        <div class="light"></div>

        <h2 id="login-title">USER PANEL</h2>
        
        <div id="main-dashboard" style="display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; margin-top: 40px; z-index: 10;">
            
            <div class="tab-buttons" style="display: flex; gap: 7px; margin-bottom: 25px; justify-content: center; flex-wrap: wrap;">
                <button type="button" onclick="showTab('home')"   style="width: 58px; height: 30px; font-size: 10px; cursor: pointer;">Home</button>
                <button type="button" onclick="showTab('calc')"   style="width: 58px; height: 30px; font-size: 10px; cursor: pointer;">Calc</button>
                <button type="button" onclick="showTab('game')"   style="width: 58px; height: 30px; font-size: 10px; cursor: pointer;">Game</button>
                <button type="button" onclick="showTab('grade')"  style="width: 58px; height: 30px; font-size: 10px; cursor: pointer;">Grade</button>
                <button type="button" onclick="showTab('diskon')" style="width: 58px; height: 30px; font-size: 10px; cursor: pointer;">Diskon</button>
                <button type="button" onclick="showTab('tugas')" style="width: 64px; height: 30px; font-size: 10px; cursor: pointer;">Aritmatika</button>
                <button type="button" onclick="showTab('typer')" style="width: 58px; height: 30px; font-size: 10px; cursor: pointer;">Typer</button>
            </div>

            <div id="content-area" style="width: 100%; min-height: 250px; color: #fff; overflow-y: auto;"></div>

            <button type="button" onclick="window.location.href='index.html'" 
                    style="margin-top: 20px; background: #ff0055; color: #fff; border: none; border-radius: 10px; width: 100px; height: 35px; cursor: pointer; font-weight: bold; font-size: 12px;">
                LOGOUT
            </button>
        </div>
    </div>

    <script src="user_script.js"></script>
    <script src="ztype_game.js"></script>
    <script src="dragon.js"></script>
</body>
</html>
